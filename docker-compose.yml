services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: devmemory
      POSTGRES_USER: devmemory
      POSTGRES_PASSWORD: devmemory_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # postgres runs every *.sql here automatically on first init of an empty
      # data dir — schema.sql doesn't need the app to call init_db() at all.
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmemory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Falls back to the local `db`/`redis` containers when .env doesn't set
      # these — set DATABASE_URL in .env to point at a managed DB (e.g. RDS)
      # without ever touching this file.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://devmemory:devmemory_local@db:5432/devmemory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-reachable backend URL, baked into the bundle at build time.
        # Override at build time for production (e.g. the ECS host's public
        # IP/domain) — "backend" is a Docker-internal hostname and won't
        # resolve from the user's browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp:
    build: ./backend
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      # Falls back to the local `db`/`redis` containers when .env doesn't set
      # these — set DATABASE_URL in .env to point at a managed DB (e.g. RDS)
      # without ever touching this file.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://devmemory:devmemory_local@db:5432/devmemory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      # /mcp requires a proper MCP JSON-RPC body to return 2xx, so we just confirm
      # something is listening — curl gets "000" only when the connection fails outright.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/mcp | grep -qE '^[1-5][0-9]{2}$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: python -m app.mcp.server

volumes:
  postgres_data:
  redis_data:
